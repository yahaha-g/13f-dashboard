<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>13F Dashboard</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;background:#fafafa}
    header{padding:16px 20px;background:#fff;border-bottom:1px solid #e6e6e6}
    main{max-width:1100px;margin:0 auto;padding:16px 20px 40px}
    .muted{color:#666;font-size:12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
    .card{background:#fff;border:1px solid #e6e6e6;border-radius:14px;padding:14px}
    .btn{margin-top:10px;padding:8px 10px;border:1px solid #e6e6e6;border-radius:10px;background:#fff;cursor:pointer}
    .hidden{display:none}
    table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e6e6e6;border-radius:14px;overflow:hidden;margin-top:10px}
    th,td{padding:10px;border-bottom:1px solid #e6e6e6;font-size:13px;text-align:left}
    th{background:#fcfcfc}
    tr:last-child td{border-bottom:none}
  </style>
</head>
<body>
<header>
  <div style="font-size:18px;font-weight:700">13F Dashboard</div>
  <div class="muted" id="subtitle">loading…</div>
</header>

<main>
  <section id="home">
    <div class="grid" id="cards"></div>
    <div class="muted" style="margin-top:10px">现在是 demo 数据：先验证网页能读取 /data/13f/*.json</div>
  </section>

  <section id="detail" class="hidden">
    <a href="#" id="back">← 返回</a>
    <h2 id="title" style="margin:12px 0 4px"></h2>
    <div class="muted" id="stats"></div>

    <table>
      <thead><tr><th>Issuer</th><th>Value ($K)</th><th>Weight</th><th>Shares</th></tr></thead>
      <tbody id="holdings"></tbody>
    </table>

    <table>
      <thead><tr><th>Change</th><th>Issuer</th><th>Δ Value ($K)</th><th>Δ Shares</th></tr></thead>
      <tbody id="diffs"></tbody>
    </table>
  </section>
</main>

<script>
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  const fmtInt = (n) => (n ?? 0).toLocaleString();

  async function j(path){
    const r = await fetch(path, { cache: "no-store" });
    if(!r.ok) throw new Error("Failed to load " + path);
    return r.json();
  }

  function showHome(){
    $("detail").classList.add("hidden");
    $("home").classList.remove("hidden");
    location.hash = "";
  }

  async function showDetail(slug){
    const d = await j(`/data/13f/${slug}.json`);
    $("home").classList.add("hidden");
    $("detail").classList.remove("hidden");

    $("title").textContent = d.name || slug;
    const c = d.stats?.changes || {};
    $("stats").textContent = `Holdings ${d.stats?.holdings ?? 0} · Top1 ${d.stats?.top1 ?? "—"} · NEW ${c.new??0} · ADD ${c.add??0} · TRIM ${c.trim??0} · EXIT ${c.exit??0}`;

    $("holdings").innerHTML = (d.holdings||[]).slice(0,30).map(h => `
      <tr>
        <td>${esc(h.issuer)}</td>
        <td>${fmtInt(h.value_usd_k)}</td>
        <td>${((h.weight||0)*100).toFixed(2)}%</td>
        <td>${fmtInt(h.shares)}</td>
      </tr>
    `).join("");

    $("diffs").innerHTML = (d.diffs||[]).slice(0,50).map(x => `
      <tr>
        <td><b>${esc(x.change)}</b></td>
        <td>${esc(x.issuer)}</td>
        <td>${(x.value_delta_k>=0?"+":"") + fmtInt(x.value_delta_k)}</td>
        <td>${(x.shares_delta>=0?"+":"") + fmtInt(x.shares_delta)}</td>
      </tr>
    `).join("");

    location.hash = slug;
  }

  async function init(){
    $("back").onclick = (e)=>{ e.preventDefault(); showHome(); };

    const idx = await j("/data/13f/index.json");
    $("subtitle").textContent = "updated: " + (idx.updated_at_utc ?? "—");

    $("cards").innerHTML = (idx.managers||[]).map(m => `
      <div class="card">
        <div style="font-weight:700">${esc(m.name || m.slug)}</div>
        <div class="muted">${esc(m.latest_quarter || "—")} · ${esc(m.filing_date || "")}</div>
        <button class="btn" data-slug="${esc(m.slug)}">View</button>
      </div>
    `).join("");

    document.querySelectorAll("button[data-slug]").forEach(b=>{
      b.onclick = ()=>showDetail(b.dataset.slug);
    });

    if(location.hash && location.hash.length > 1){
      await showDetail(location.hash.slice(1));
    }
  }

  init().catch(err=>{
    console.error(err);
    $("subtitle").textContent = "加载失败：请确认 public/data/13f/index.json 存在且可访问。";
  });
</script>
</body>
</html>
