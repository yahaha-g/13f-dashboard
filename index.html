<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>13F Dashboard</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;background:#fafafa;}
    header{padding:16px 20px;background:#fff;border-bottom:1px solid #e6e6e6;position:sticky;top:0}
    main{max-width:1100px;margin:0 auto;padding:16px 20px 40px}
    .muted{color:#666;font-size:12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
    .card{background:#fff;border:1px solid #e6e6e6;border-radius:14px;padding:14px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .btn{display:inline-block;margin-top:10px;padding:8px 10px;border:1px solid #e6e6e6;border-radius:10px;background:#fff;cursor:pointer}
    .hidden{display:none}
    table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e6e6e6;border-radius:14px;overflow:hidden}
    th,td{padding:10px;border-bottom:1px solid #e6e6e6;font-size:13px;text-align:left}
    th{background:#fcfcfc}
    tr:last-child td{border-bottom:none}
    input{padding:10px 12px;border-radius:12px;border:1px solid #e6e6e6;width:min(520px,100%)}
    a{color:inherit}
  </style>
</head>
<body>
<header>
  <div class="row" style="justify-content:space-between">
    <div>
      <div style="font-size:18px;font-weight:700">13F Dashboard</div>
      <div class="muted" id="subtitle">加载中…（先跑一次 GitHub Actions 生成数据）</div>
    </div>
  </div>
</header>

<main>
  <section id="home">
    <div class="grid" id="cards"></div>
    <div class="muted" style="margin-top:10px">数据来源：SEC EDGAR · 13F 为季度披露（非实时持仓）</div>
  </section>

  <section id="detail" class="hidden">
    <div class="row">
      <a href="#" id="back">← 返回</a>
      <span class="muted" id="dq"></span>
      <span class="muted" id="dd"></span>
      <a class="muted" id="src" target="_blank" rel="noreferrer">SEC 文件</a>
    </div>

    <h2 id="title" style="margin:12px 0 4px"></h2>
    <div class="muted" id="stats"></div>

    <div style="margin-top:12px">
      <input id="search" placeholder="搜索公司名（例如 Apple）" />
    </div>

    <h3 style="margin:14px 0 8px">Top Holdings</h3>
    <table>
      <thead><tr><th>Issuer</th><th>Value ($K)</th><th>Weight</th><th>Shares</th></tr></thead>
      <tbody id="holdings"></tbody>
    </table>

    <h3 style="margin:14px 0 8px">Changes（vs 上一期 13F）</h3>
    <table>
      <thead><tr><th>Change</th><th>Issuer</th><th>Δ Value ($K)</th><th>Δ Shares</th></tr></thead>
      <tbody id="diffs"></tbody>
    </table>
  </section>
</main>

<script>
  const $ = (id) => document.getElementById(id);
  const fmtInt = (n) => (n ?? 0).toLocaleString();
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  async function j(path){ const r=await fetch(path,{cache:"no-store"}); if(!r.ok) throw new Error(path); return r.json(); }

  function showHome(){ $("detail").classList.add("hidden"); $("home").classList.remove("hidden"); location.hash=""; }
  async function showDetail(slug){
    const d = await j(`/data/13f/${slug}.json`);
    $("home").classList.add("hidden"); $("detail").classList.remove("hidden");
    $("title").textContent = d.name;
    $("dq").textContent = d.latest?.quarter ?? "";
    $("dd").textContent = d.latest?.filing_date ? ("Filed: " + d.latest.filing_date) : "";
    $("src").href = d.latest?.infotable_url ?? "#";
    const c = d.stats?.changes || {};
    $("stats").textContent = `Holdings ${d.stats?.holdings ?? 0} · NEW ${c.new??0} · ADD ${c.add??0} · TRIM ${c.trim??0} · EXIT ${c.exit??0}`;

    const holdings = d.holdings || [];
    const diffs = d.diffs || [];

    const render = ()=>{
      const q = $("search").value.trim().toLowerCase();
      const H = q ? holdings.filter(x => (x.issuer||"").toLowerCase().includes(q)) : holdings;
      const D = q ? diffs.filter(x => (x.issuer||"").toLowerCase().includes(q)) : diffs;
      $("holdings").innerHTML = H.slice(0,50).map(h=>`<tr><td>${esc(h.issuer)}</td><td>${fmtInt(h.value_usd_k)}</td><td>${((h.weight||0)*100).toFixed(2)}%</td><td>${fmtInt(h.shares)}</td></tr>`).join("");
      $("diffs").innerHTML = D.slice(0,120).map(x=>`<tr><td><b>${esc(x.change)}</b></td><td>${esc(x.issuer)}</td><td>${(x.value_delta_k>=0?"+":"") + fmtInt(x.value_delta_k)}</td><td>${(x.shares_delta>=0?"+":"") + fmtInt(x.shares_delta)}</td></tr>`).join("");
    };
    $("search").value=""; $("search").oninput = render; render();
  }

  async function init(){
    $("back").onclick = (e)=>{e.preventDefault(); showHome();};
    const idx = await j("/data/13f/index.json");
    $("subtitle").textContent = "Last updated: " + (idx.updated_at_utc ?? "—");
    $("cards").innerHTML = (idx.managers||[]).map(m=>{
      const c = m.changes||{};
      return `<div class="card">
        <div style="font-weight:700">${esc(m.name||m.slug)}</div>
        <div class="muted">${esc(m.latest_quarter||"—")} · ${esc(m.filing_date||"")}</div>
        <div style="margin-top:8px" class="muted">Holdings ${fmtInt(m.holdings||0)} · Top1 ${esc(m.top1||"—")}</div>
        <div style="margin-top:6px" class="muted">NEW ${c.new||0} / EXIT ${c.exit||0} · ADD ${c.add||0} / TRIM ${c.trim||0}</div>
        <button class="btn" data-slug="${esc(m.slug)}">View</button>
      </div>`;
    }).join("");
    document.querySelectorAll("button[data-slug]").forEach(b=>b.onclick=()=>{ location.hash=b.dataset.slug; showDetail(b.dataset.slug); });

    if(location.hash?.length>1) await showDetail(location.hash.slice(1));
  }

  init().catch(err=>{
    console.error(err);
    $("subtitle").textContent = "加载失败：请先跑一次 GitHub Actions 生成数据（或检查 Actions 日志）。";
  });
</script>
</body>
</html>
